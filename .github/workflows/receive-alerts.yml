name: Receive Alerts

on:
  repository_dispatch:
    types: [alert]

permissions:
  contents: write

jobs:
  process-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create/Update alert file
        run: |
          mkdir -p alerts
          FILE="alerts/${{ steps.date.outputs.today }}.md"
          
          # 提取告警信息
          ALERT_NAME="${{ github.event.client_payload.alert_name }}"
          SEVERITY="${{ github.event.client_payload.severity }}"
          ALERT_VALUE="${{ github.event.client_payload.alert_value }}"
          HOST="${{ github.event.client_payload.host }}"
          DETAIL="${{ github.event.client_payload.alert_detail }}"
          TIMESTAMP=$(date -Iseconds)
          
          # 追加告警内容
          cat >> "$FILE" << EOF

          ---
          
          ## ${ALERT_NAME}
          
          | 字段 | 值 |
          |------|-----|
          | 时间 | ${TIMESTAMP} |
          | 级别 | ${SEVERITY} |
          | 值 | ${ALERT_VALUE} |
          | 主机 | ${HOST} |
          
          ### 详情
          ${DETAIL}
          
          EOF
          
          cat "$FILE"

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add alerts/
          git diff --staged --quiet || git commit -m "Alert: ${{ github.event.client_payload.alert_name }} [${{ github.event.client_payload.severity }}]"
          git push
